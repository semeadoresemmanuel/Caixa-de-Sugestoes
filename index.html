<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#002400" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/9HxKWZcR/path1-1-2.png" />
    <title>Caixa de Sugestões</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Registo Forçado do Modo Offline -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(() => console.log('Modo offline ativado com sucesso!'))
            .catch(err => console.log('Erro no offline: ', err));
        });
      }
    </script>
  </body>
</html>
